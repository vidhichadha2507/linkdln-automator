services:
  db:
    image: postgres:16-alpine
    container_name: linkedin-email-automator-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkedin_email
      POSTGRES_PASSWORD: linkedin_email
      POSTGRES_DB: linkedin_email_automator
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkedin_email -d linkedin_email_automator"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-email-automator-api
    profiles:
      - app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://linkedin_email:linkedin_email@db:5432/linkedin_email_automator?schema=public
      CORS_ORIGIN: "*"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    command: sh -c "npm install && npx prisma migrate deploy && npx prisma db seed && npm run dev"

volumes:
  postgres_data:
  api_node_modules:
